<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>503 Service Unavailable</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#f2f4f7;
color:#333;
padding:20px;
}

.wrapper{
max-width:600px;
width:100%;
background:white;
padding:50px 30px;
text-align:center;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

h1{
font-size:42px;
margin-bottom:15px;
font-weight:700;
}

p{
font-size:18px;
line-height:1.6;
margin-bottom:10px;
color:#555;
}

.code{
font-size:14px;
margin-top:20px;
opacity:0.6;
}

@media (max-width:600px){

h1{
font-size:32px;
}

p{
font-size:16px;
}

.wrapper{
padding:35px 20px;
}

}

</style>

</head>

<body>

<div class="wrapper">

<h1>503</h1>

<p><strong>Service Temporarily Unavailable</strong></p>

<p>
The server is currently unable to handle this request due to a temporary issue.
Please try again later.
</p>

<div class="code">
Server Status: Temporarily Unavailable
</div>

</div>

</body>
</html>
